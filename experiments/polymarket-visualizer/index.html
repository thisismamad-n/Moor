<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Polymarket Weather — p5.js Generative Scanner Visualization</title>
<script>p5.disableFriendlyErrors=true;</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#05050b;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;}
  canvas{display:block;}
  #boot{position:fixed;left:18px;bottom:16px;color:#d7e7ff;font-size:12px;letter-spacing:.08em;text-transform:uppercase;opacity:.75;pointer-events:none;}
</style>
</head>
<body>
<div id="boot">loading polymarket weather</div>
<script>
const TAU = Math.PI * 2;
const GOLDEN = Math.PI * (3 - Math.sqrt(5));
let snapshot = makeDemoSnapshot();
let historiesById = new Map();
let markets = [];
let stars = [];
let selected = null;
let hovered = null;
let paused = false;
let showHud = true;
let statusText = "demo data loaded";
let minLogVol = 0, maxLogVol = 1;
let minScore = 0, maxScore = 1;
let maxRadius = 360;

function preload() {
  const snapPromise = fetch("data/polymarket_snapshot.json")
    .then(r => { if (!r.ok) throw new Error("snapshot not found"); return r.json(); })
    .catch(() => null);
  const histPromise = fetch("data/polymarket_history.json")
    .then(r => { if (!r.ok) throw new Error("history not found"); return r.json(); })
    .catch(() => null);

  Promise.all([snapPromise, histPromise]).then(([snap, hist]) => {
    if (snap && Array.isArray(snap.markets) && snap.markets.length) {
      snapshot = snap;
      statusText = "live snapshot loaded";
    } else {
      snapshot = makeDemoSnapshot();
      statusText = "demo data loaded";
    }
    if (hist && Array.isArray(hist.histories)) {
      historiesById = new Map(hist.histories.map(h => [String(h.id), h.history || []]));
    }
    buildWorld();
    document.getElementById("boot").textContent = statusText;
  });
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  colorMode(HSB, 360, 100, 100, 1);
  frameRate(60);
  randomSeed(1337);
  noiseSeed(1337);
  buildStars();
  buildWorld();
}

function buildStars() {
  stars = [];
  const count = Math.floor(Math.min(420, Math.max(140, width * height / 5200)));
  for (let i = 0; i < count; i++) {
    stars.push({
      x: random(width),
      y: random(height),
      r: random(0.35, 1.45),
      a: random(0.08, 0.45),
      tw: random(0.006, 0.022)
    });
  }
}

function buildWorld() {
  const all = Array.isArray(snapshot.markets) ? snapshot.markets : [];
  const visible = all.slice(0, 150);
  const logVols = visible.map(m => Math.log10(Math.max(1, num(m.volume))));
  minLogVol = Math.min(...logVols, 0);
  maxLogVol = Math.max(...logVols, 1);
  const scores = visible.map(m => num(m.opportunity_score));
  minScore = Math.min(...scores, 0);
  maxScore = Math.max(...scores, 1);
  maxRadius = Math.min(width, height) * 0.46;

  markets = visible.map((m, idx) => {
    const id = String(m.id || idx);
    const price = clamp(num(m.yes_price, m.last_price || 0.5), 0, 1);
    const momentum = num(m.momentum, 0);
    const volatility = num(m.volatility, 0.02);
    const uncertainty = clamp(num(m.uncertainty, 1 - Math.abs(price - 0.5) * 2), 0, 1);
    const volume = Math.max(0, num(m.volume));
    const liquidity = Math.max(0, num(m.liquidity));
    const logVol = Math.log10(volume + 1);
    const volN = norm(logVol, minLogVol, maxLogVol);
    const scoreN = norm(num(m.opportunity_score), minScore, maxScore);
    const radius = map(volN, 0, 1, 6, 30);
    const baseR = map(price, 0, 1, 42, maxRadius);
    const angle = idx * GOLDEN + hash01(id) * TAU;
    const speed = (0.00035 + volatility * 0.035 + scoreN * 0.0025) * (momentum >= 0 ? 1 : -1);
    const hue = (categoryHue(m.category) + (price - 0.5) * 70 + scoreN * 18) % 360;
    return {
      market: m,
      id,
      idx,
      price,
      momentum,
      volatility,
      uncertainty,
      volume,
      liquidity,
      logVol,
      volN,
      scoreN,
      radius,
      baseR,
      angle,
      speed,
      hue,
      history: historiesById.get(id) || findHistory(id, snapshot) || syntheticHistory(price, volatility, idx)
    };
  });
}

function findHistory(id, snap) {
  if (!snap || !Array.isArray(snap.histories)) return null;
  const h = snap.histories.find(x => String(x.id) === String(id));
  return h && Array.isArray(h.history) ? h.history : null;
}

function draw() {
  drawBackground();
  drawConstellations();
  drawHistories();
  drawMarkets();
  if (showHud) drawHud();
  if (hovered) drawTooltip(hovered);
}

function drawBackground() {
  background(232, 58, 4, 0.18);
  push();
  blendMode(ADD);
  for (const s of stars) {
    const a = s.a * (0.55 + 0.45 * Math.sin(millis() * s.tw + s.x * 0.01));
    stroke(210, 35, 92, a);
    strokeWeight(s.r);
    point(s.x, s.y);
  }
  const cx = width / 2, cy = height / 2;
  for (let i = 0; i < 7; i++) {
    const rr = (Math.min(width, height) * (0.08 + i * 0.075)) + Math.sin(millis() * 0.00018 + i) * 10;
    stroke((210 + i * 14) % 360, 55, 45, 0.055);
    strokeWeight(1);
    noFill();
    ellipse(cx, cy, rr * 2);
  }
  pop();
}

function drawConstellations() {
  const cx = width / 2, cy = height / 2;
  push();
  blendMode(ADD);
  for (const p of markets) {
    const a = 0.035 + p.volN * 0.12;
    stroke(p.hue, 75, 78, a);
    strokeWeight(0.55 + p.volN * 1.2);
    line(cx, cy, cx + Math.cos(p.angle) * p.baseR, cy + Math.sin(p.angle) * p.baseR);
  }
  pop();

  push();
  fill(220, 35, 72, 0.72);
  textAlign(CENTER, CENTER);
  textSize(Math.max(13, Math.min(width, height) * 0.018));
  text("POLYMARKET WEATHER", cx, cy - 18);
  textSize(Math.max(10, Math.min(width, height) * 0.011));
  fill(220, 20, 82, 0.55);
  text("each orbit is a market probability breathing through time", cx, cy + 8);
  pop();
}

function drawHistories() {
  const cx = width / 2, cy = height / 2;
  push();
  blendMode(ADD);
  for (const p of markets) {
    const hist = p.history && p.history.length ? p.history : [];
    if (hist.length < 2) continue;
    noFill();
    for (let k = 1; k < hist.length; k++) {
      const prev = hist[k - 1], cur = hist[k];
      const a0 = p.angle + (prev.t % 100000) * 0.00009 + Math.sin(k * 0.17) * 0.08;
      const a1 = p.angle + (cur.t % 100000) * 0.00009 + Math.sin(k * 0.17) * 0.08;
      const r0 = map(clamp(num(prev.p), 0, 1), 0, 1, 42, maxRadius);
      const r1 = map(clamp(num(cur.p), 0, 1), 0, 1, 42, maxRadius);
      const alpha = 0.035 + p.scoreN * 0.12;
      stroke(p.hue, 70, 82, alpha);
      strokeWeight(0.45 + p.volN * 1.1);
      line(cx + Math.cos(a0) * r0, cy + Math.sin(a0) * r0, cx + Math.cos(a1) * r1, cy + Math.sin(a1) * r1);
    }
  }
  pop();
}

function drawMarkets() {
  const cx = width / 2, cy = height / 2;
  const t = millis() * 0.001;
  hovered = null;
  push();
  blendMode(ADD);
  for (const p of markets) {
    const wobble = Math.sin(t * (0.7 + p.scoreN * 2.5) + p.idx) * (3 + p.uncertainty * 10);
    const angle = p.angle + t * p.speed + wobble * 0.002;
    const r = p.baseR + Math.sin(t * 0.9 + p.idx * 1.7) * (2 + p.uncertainty * 8);
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    p.x = x; p.y = y; p.currentAngle = angle; p.currentR = r;
    const near = Math.hypot(mouseX - x, mouseY - y) < p.radius + 12;
    if (near) hovered = p;

    const pulse = 0.75 + 0.25 * Math.sin(t * 2.2 + p.idx);
    const alpha = selected === p ? 0.95 : (0.28 + p.volN * 0.45) * pulse;
    fill(p.hue, 78, 92, alpha);
    noStroke();
    ellipse(x, y, p.radius * (2.1 + p.uncertainty * 1.2));
    stroke(p.hue, 80, 95, selected === p ? 0.95 : 0.45);
    strokeWeight(selected === p ? 2.2 : 0.9 + p.volN * 1.4);
    ellipse(x, y, p.radius * 1.15);
    noFill();
    stroke((p.hue + 80) % 360, 65, 80, 0.22);
    strokeWeight(1);
    ellipse(x, y, p.radius * (2.8 + p.uncertainty * 1.8));
  }
  pop();

  push();
  fill(0, 0, 95, 0.88);
  noStroke();
  const top = markets.slice().sort((a, b) => b.volume - a.volume).slice(0, Math.min(8, markets.length));
  for (let i = 0; i < top.length; i++) {
    const p = top[i];
    if (selected !== p && hovered !== p && (p.x < 0 || p.x > width || p.y < 0 || p.y > height)) continue;
    fill(p.hue, 55, 92, 0.72);
    textSize(10);
    textAlign(LEFT, TOP);
    text(formatShort(p.market.question), p.x + p.radius + 5, p.y - p.radius - 5);
  }
  pop();
}


function drawHud() {
  const pad = 18;
  push();
  fill(232, 55, 8, 0.28);
  noStroke();
  rect(pad, pad, Math.min(430, width - pad * 2), 154, 18);
  fill(220, 18, 94, 0.96);
  textAlign(LEFT, TOP);
  textSize(22);
  textStyle(BOLD);
  text("Polymarket Weather", pad + 16, pad + 16);
  textStyle(NORMAL);
  textSize(11);
  fill(220, 18, 82, 0.72);
  text(statusText + " • read-only scanner • not financial advice", pad + 17, pad + 45);
  textSize(12);
  const s = snapshot.summary || {};
  const lines = [
    `markets: ${s.market_count || 0}    total volume: ${money(s.total_volume || 0)}`,
    `median volume: ${money(s.median_volume || 0)}    top score: ${num(s.top_opportunity_score).toFixed(1)}`,
    `generated: ${String(snapshot.generated_at || "").replace("T", " ").slice(0, 19)} UTC`,
    `space: pause/resume    H: hud    R: reshuffle    S: save png    click: pin market`
  ];
  for (let i = 0; i < lines.length; i++) {
    fill(220, 20, 86, 0.72);
    text(lines[i], pad + 17, pad + 66 + i * 18);
  }
  pop();

  push();
  const w = Math.min(360, width - pad * 2);
  const x = width - w - pad;
  fill(232, 55, 8, 0.24);
  noStroke();
  rect(x, pad, w, 184, 18);
  fill(220, 18, 94, 0.92);
  textAlign(LEFT, TOP);
  textSize(13);
  textStyle(BOLD);
  text("Signal legend", x + 16, pad + 16);
  textStyle(NORMAL);
  textSize(11);
  const legend = [
    ["binary-mismatch-watch", "Yes/No prices do not sum near 100%"],
    ["coinflip-high-volatility", "near 50/50 with noisy movement"],
    ["strong-momentum", "large recent probability shift"],
    ["volatile", "history is jumping around"],
    ["deep-liquidity-conviction", "large market with firm consensus"]
  ];
  for (let i = 0; i < legend.length; i++) {
    const y = pad + 45 + i * 25;
    fill((i * 47 + 190) % 360, 70, 88, 0.9);
    ellipse(x + 25, y + 6, 8);
    fill(220, 18, 84, 0.72);
    text(legend[i][0], x + 40, y);
    fill(220, 18, 70, 0.48);
    text(legend[i][1], x + 40, y + 13);
  }
  pop();

  push();
  const top = (snapshot.top_signals || markets.slice().sort((a, b) => num(b.opportunity_score) - num(a.opportunity_score))).slice(0, 7);
  const boxW = Math.min(560, width - pad * 2);
  const boxH = 190;
  const x2 = (width - boxW) / 2;
  const y2 = height - boxH - pad;
  fill(232, 55, 8, 0.25);
  noStroke();
  rect(x2, y2, boxW, boxH, 18);
  fill(220, 18, 94, 0.9);
  textAlign(LEFT, TOP);
  textSize(13);
  textStyle(BOLD);
  text("Top opportunity scores", x2 + 16, y2 + 14);
  textStyle(NORMAL);
  textSize(11);
  for (let i = 0; i < top.length; i++) {
    const p = Array.isArray(top[i].market) ? null : top[i];
    if (!p) continue;
    const yy = y + 42 + i * 20;
    const hue = p.hue || categoryHue(p.market && p.market.category);
    fill(hue, 70, 90, 0.82);
    ellipse(x + 24, yy + 4, 7);
    fill(220, 18, 86, 0.78);
    text(`${num(p.opportunity_score).toFixed(1)}  ${String(p.signal || "normal")}  yes ${(num(p.yes_price) * 100).toFixed(0)}%  vol ${compactMoney(p.volume)}`, x2 + 39, yy);
    fill(220, 18, 68, 0.45);
    text(formatShort(p.market && p.market.question, 92), x2 + 39, yy + 11);
  }
  pop();
}

function drawTooltip(p) {
  const m = p.market || {};
  const lines = [
    formatShort(m.question, 56),
    `Yes ${(p.price * 100).toFixed(1)}%   No ${((1 - p.price) * 100).toFixed(1)}%`,
    `volume ${compactMoney(p.volume)}   liquidity ${compactMoney(p.liquidity)}`,
    `momentum ${(p.momentum * 100).toFixed(1)} pts   vol ${(p.volatility * 100).toFixed(1)} pts`,
    `signal: ${p.market.signal || "normal"}   score ${num(p.opportunity_score).toFixed(1)}`
  ];
  const w = 330, h = 24 + lines.length * 18;
  let x = p.x + 18, y = p.y - h / 2;
  x = clamp(x, 12, width - w - 12);
  y = clamp(y, 12, height - h - 12);
  push();
  fill(232, 60, 8, 0.88);
  noStroke();
  rect(x, y, w, h, 14);
  stroke(p.hue, 70, 90, 0.75);
  strokeWeight(1.2);
  noFill();
  rect(x + 0.5, y + 0.5, w - 1, h - 1, 14);
  fill(220, 15, 94, 0.96);
  textAlign(LEFT, TOP);
  textSize(12);
  textStyle(BOLD);
  text(lines[0], x + 12, y + 10);
  textStyle(NORMAL);
  textSize(11);
  for (let i = 1; i < lines.length; i++) {
    fill(220, 18, 82, 0.78);
    text(lines[i], x + 12, y + 10 + i * 18);
  }
  pop();
}

function mousePressed() {
  if (hovered) selected = hovered;
}

function keyPressed() {
  if (key === " " || key === "Spacebar") paused = !paused;
  if (key === "h" || key === "H") showHud = !showHud;
  if (key === "r" || key === "R") {
    randomSeed(millis());
    noiseSeed(millis());
    buildStars();
    buildWorld();
  }
  if (key === "s" || key === "S") saveCanvas("polymarket-weather", "png");
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  maxRadius = Math.min(width, height) * 0.46;
  buildStars();
  buildWorld();
}


function categoryHue(category) {
  const c = String(category || "Uncategorized").toLowerCase();
  if (c.includes("crypto")) return 188;
  if (c.includes("politic")) return 282;
  if (c.includes("sport")) return 42;
  if (c.includes("entertainment") || c.includes("music") || c.includes("award")) return 318;
  if (c.includes("finance") || c.includes("economy") || c.includes("business")) return 118;
  if (c.includes("science") || c.includes("tech") || c.includes("ai")) return 205;
  if (c.includes("weather") || c.includes("climate")) return 160;
  return 225 + hash01(c) * 90;
}

function syntheticHistory(price, volatility, idx) {
  const now = Math.floor(Date.now() / 1000);
  const out = [];
  let p = price + (Math.sin(idx) * 0.08);
  for (let i = 95; i >= 0; i--) {
    p += (Math.random() - 0.5) * Math.max(0.012, volatility * 1.8);
    p += (price - p) * 0.035;
    p = clamp(p, 0.02, 0.98);
    out.push({t: now - i * 3600, p: Number(p.toFixed(3))});
  }
  return out;
}

function hash01(str) {
  let h = 2166136261;
  str = String(str || "");
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return ((h >>> 0) % 100000) / 100000;
}

function num(v, fallback = 0) {
  const n = Number(v);
  return Number.isFinite(n) ? n : fallback;
}

function clamp(x, lo, hi) {
  return Math.max(lo, Math.min(hi, x));
}

function norm(x, lo, hi) {
  if (hi <= lo) return 0.5;
  return clamp((x - lo) / (hi - lo), 0, 1);
}

function map(v, a1, a2, b1, b2) {
  return b1 + (v - a1) * (b2 - b1) / (a2 - a1 || 1);
}

function compactMoney(v) {
  v = num(v);
  if (v >= 1e9) return "$" + (v / 1e9).toFixed(1) + "B";
  if (v >= 1e6) return "$" + (v / 1e6).toFixed(1) + "M";
  if (v >= 1e3) return "$" + (v / 1e3).toFixed(0) + "K";
  return "$" + v.toFixed(0);
}

function money(v) {
  v = num(v);
  if (v >= 1e9) return "$" + (v / 1e9).toFixed(2) + "B";
  if (v >= 1e6) return "$" + (v / 1e6).toFixed(1) + "M";
  return "$" + v.toLocaleString(undefined, {maximumFractionDigits: 0});
}

function formatShort(s, maxLen = 48) {
  s = String(s || "");
  return s.length > maxLen ? s.slice(0, maxLen - 1) + "…" : s;
}


function makeDemoSnapshot() {
  const now = Math.floor(Date.now() / 1000);
  const seeds = [
    ["Politics", "Will the incumbent party win the next national election?", 0.58, 18500000, 2100000, 0.055, "strong-momentum"],
    ["Crypto", "Will Bitcoin trade above $120k before year end?", 0.43, 9200000, 1300000, 0.095, "volatile"],
    ["AI", "Will a frontier lab release an open-weight model over 200B parameters this year?", 0.36, 3100000, 410000, 0.12, "coinflip-high-volatility"],
    ["Sports", "Will the defending champion reach the finals?", 0.67, 6400000, 880000, 0.035, "deep-liquidity-conviction"],
    ["Finance", "Will the central bank cut rates at the next meeting?", 0.51, 12800000, 1700000, 0.075, "coinflip-high-volatility"],
    ["Entertainment", "Will the top-grossing film pass $1.5B worldwide?", 0.29, 1900000, 260000, 0.08, "normal"],
    ["Science", "Will a crewed lunar mission launch this calendar year?", 0.22, 2700000, 340000, 0.04, "normal"],
    ["Climate", "Will this year be the hottest on record globally?", 0.74, 5100000, 720000, 0.025, "deep-liquidity-conviction"],
    ["Crypto", "Will a spot ETH ETF see net inflows above $2B this month?", 0.48, 4300000, 590000, 0.11, "coinflip-high-volatility"],
    ["Politics", "Will the budget bill pass before the deadline?", 0.62, 7600000, 950000, 0.06, "strong-momentum"],
    ["Business", "Will the company beat consensus revenue next quarter?", 0.55, 2200000, 310000, 0.085, "volatile"],
    ["Weather", "Will the named storm make landfall in Florida?", 0.31, 3800000, 520000, 0.13, "volatile"]
  ];
  const markets = seeds.map((s, idx) => {
    const [cat, q, p, vol, liq, volat, sig] = s;
    const yes = clamp(p + Math.sin(idx * 1.7) * 0.018, 0.03, 0.97);
    const no = 1 - yes + (idx === 8 ? 0.035 : 0);
    const hist = [];
    let pp = yes;
    for (let i = 95; i >= 0; i--) {
      pp += (Math.sin(i * 0.19 + idx) * 0.006) + (Math.random() - 0.5) * volat * 0.8;
      pp += (yes - pp) * 0.025;
      pp = clamp(pp, 0.02, 0.98);
      hist.push({t: now - i * 3600, p: Number(pp.toFixed(3))});
    }
    const mom = (hist[hist.length - 1].p - hist[0].p);
    const score = (1 - Math.abs(yes - 0.5) * 2) * 22 + Math.abs(mom) * 90 + volat * 120 + Math.log10(vol + 1) * 2.5 - (idx === 8 ? 5 : 0);
    return {
      id: "demo-" + idx,
      condition_id: "0x" + (1000 + idx).toString(16).padStart(4, "0"),
      slug: "demo-market-" + idx,
      question: q,
      category: cat,
      market_type: "binary",
      active: true,
      closed: false,
      outcomes: ["Yes", "No"],
      yes_outcome: "Yes",
      no_outcome: "No",
      yes_token_id: "token-yes-" + idx,
      no_token_id: "token-no-" + idx,
      yes_price: Number(yes.toFixed(3)),
      no_price: Number(no.toFixed(3)),
      implied_sum: Number((yes + no).toFixed(3)),
      binary_error: Number(Math.abs(1 - (yes + no)).toFixed(3)),
      volume: vol,
      liquidity: liq,
      open_interest: liq * 0.42,
      url: "https://polymarket.com/demo/" + idx,
      first_price: hist[0].p,
      last_price: hist[hist.length - 1].p,
      momentum: Number(mom.toFixed(3)),
      abs_momentum: Math.abs(mom),
      volatility: Number(volat.toFixed(3)),
      uncertainty: Number((1 - Math.abs(yes - 0.5) * 2).toFixed(3)),
      opportunity_score: Number(score.toFixed(3)),
      signal: sig,
      trend: mom > 0.03 ? "up" : mom < -0.03 ? "down" : "flat",
      history_points: hist.length
    };
  });
  return {
    generated_at: new Date().toISOString(),
    read_only: true,
    not_financial_advice: true,
    summary: {
      market_count: markets.length,
      total_volume: markets.reduce((a, m) => a + m.volume, 0),
      median_volume: 4750000,
      max_volume: Math.max(...markets.map(m => m.volume)),
      avg_opportunity_score: markets.reduce((a, m) => a + m.opportunity_score, 0) / markets.length,
      top_opportunity_score: Math.max(...markets.map(m => m.opportunity_score)),
      signal_counts: {"coinflip-high-volatility": 3, volatile: 3, "strong-momentum": 2, "deep-liquidity-conviction": 2, normal: 2}
    },
    top_signals: markets.slice().sort((a, b) => b.opportunity_score - a.opportunity_score).slice(0, 20),
    markets,
    histories: markets.map(m => ({id: m.id, question: m.question, history: syntheticHistory(m.yes_price, m.volatility, m.id)}))
  };
}
</script>
</body>
</html>
