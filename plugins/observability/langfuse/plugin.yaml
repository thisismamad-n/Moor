name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Moor — traces conversations, LLM calls, and tool usage. Opt-in via `hermes plugins enable observability/langfuse` or `moor tools → Langfuse Observability`."
author: Moor inc.
requires_env:
  - HERMES_LANGFUSE_PUBLIC_KEY
  - HERMES_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
